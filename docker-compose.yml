version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      - backend
    networks:
      - teamboard_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_HOST=database
    depends_on:
      database:
        condition: service_healthy
    networks:
      - teamboard_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - teamboard_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  portainer:
    image: portainer/portainer-ce:2.27.3
    ports:
      - "9000:9000"
    container_name: teamboard-portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - teamboard_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
  

networks:
  teamboard_net:

volumes:
  pgdata:
  portainer_data: