version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      - backend
    networks:
      - teamboard_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_HOST=database
    depends_on:
      database:
        condition: service_healthy
    networks:
      - teamboard_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  database:
    image: postgres:16-alpine
    container_name: teamboard-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - teamboard_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
    # TODO (Feature 05): Configurar el montaje del socket de Docker
    # TODO (Feature 05): Configurar el volumen persistente para la data
    networks:
      - teamboard_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  pgadmin:
    image: dpage/pgadmin4
    container_name: teamboard-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - teamboard_net
    depends_on:
      database:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
          
networks:
  teamboard_net:
    driver: bridge

volumes:
  pgdata:
  portainer_data:
  pgadmin_data: